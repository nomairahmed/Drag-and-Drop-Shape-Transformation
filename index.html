<html>
    <head>
        <style>
            html,
            body {
            height: 100%;
            padding: 0;
            margin: 0;
            }

            .segment {
            width: 50%;
            height: 50%;
            float: left;
            box-sizing: border-box;
            border-color: black;
            border-style: solid;
            }

           .circle {
                border-radius: 50%;
                clip-path: none; 
            }

            .shape {
                width: 80px;
                height: 80px;
                background-color: #2c3e50;
            }

        </style>

    </head>
    <body>
        <div id="div1" class = "segment">
            <div class="shape circle" draggable="true"></div>
        </div>
        <div id="div2" class = "segment">
        </div>
        <div id="div3" class = "segment">
        </div>
        <div id="div4" class = "segment">
        </div>

    </body>

</html>
