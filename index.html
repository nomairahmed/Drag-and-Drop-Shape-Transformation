<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <title>Drag-and-Drop Shape Transformation</title>

    </head>
    <body>
        <div id="div1" class = "segment" shape-type = "circle">
            <div class="shape circle" id="shape-1" draggable="true"></div>
            <div class="shape circle" id="shape-2" draggable="true"></div>
            <div class="shape circle" id="shape-3" draggable="true"></div>
            <div class="shape circle" id="shape-4" draggable="true"></div>
            <div class="shape circle" id="shape-5" draggable="true"></div>
        </div>
        <div id="div2" class = "segment" shape-type = "hexagon">
        </div>
        <div id="div3" class = "segment" shape-type = "square">
        </div>
        <div id="div4" class = "segment" shape-type = "triangle">
        </div>

        <script src="index.js"></script>
    </body>
</html>
