<html>
    <head>
        <style>
            html,
            body {
            height: 100%;
            padding: 0;
            margin: 0;
            }

            .segment {
            width: 50%;
            height: 50%;
            float: left;
            box-sizing: border-box;
            border-color: black;
            border-style: solid;
            }

           .circle {
                border-radius: 50%;
                clip-path: none; 
            }

            .hexagon {
                border-radius: 0;
                clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            }

            .square {
                border-radius: 0;
                clip-path: none;
            }

            .triangle {
                border-radius: 0;
                clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            }

            .shape {
                width: 80px;
                height: 80px;
                background-color: #2c3e50;
            }

        </style>

    </head>
    <body>
        <div id="div1" class = "segment">
            <div class="shape circle" id="shape-1" draggable="true"></div>
            <div class="shape circle" id="shape-2" draggable="true"></div>
            <div class="shape circle" id="shape-3" draggable="true"></div>
            <div class="shape circle" id="shape-4" draggable="true"></div>
            <div class="shape circle" id="shape-5" draggable="true"></div>
        </div>
        <div id="div2" class = "segment">
        </div>
        <div id="div3" class = "segment">
        </div>
        <div id="div4" class = "segment">
        </div>

        <script>
            const shapes = document.querySelectorAll('.shape');
            const segments = document.querySelectorAll('.segment');
            shapes.forEach(shape =>{
                shape.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', e.target.id);
                });
            });

            segments.forEach(segment => {
  
                segment.addEventListener('dragover', (e) => {
                    e.preventDefault(); 
                });
                segment.addEventListener('drop', (e) => {
                    e.preventDefault();                 

                    const draggedId = e.dataTransfer.getData('text/plain');
                    const draggedElement = document.getElementById(draggedId);
                    const dropZone = e.target.closest('.segment');
                    
                    if (dropZone && draggedElement) {

                        dropZone.appendChild(draggedElement);
                    }
                });
            });
        </script>
    </body>
</html>
